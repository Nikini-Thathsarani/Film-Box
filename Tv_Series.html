<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmBox</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Tv_Series.css">
</head>
<body>

<video autoplay muted loop class="bg-video">
  <source src="homepage.vid.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<header>
  <nav class="navbar">
    <div class="logo">
      <span class="green">Film</span><span class="white">Box</span>
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="movies.html">Movies</a></li>
      <li><a class="active" href="#">TV Shows</a></li>
      <li><a href="favoirites.html">Favourites</a></li>
    </ul>

    <input type="text" placeholder="Search..." class="search">
  </nav>
</header>

<section class="page-header">
  <h1><span class="green">All</span> TV Series</h1>
  <p>Explore the best series collection.</p>
</section>


<section class="series-grid">

 
  <div class="series-card">
    <span class="badge trending">TRENDING</span>
    <img src="bb.jfif">
    <div class="card-content">
      <h3>Breaking Bad</h3>
      <div class="info">
        <span>2008</span>
        <span>Crime</span>
      </div>
      <div class="rating">⭐ 9.5</div>
    </div>
    <div class="hover-overlay">
      <a href="breaking.html" class="details-btn">View Details</a>
    </div>
  </div>


  <div class="series-card">
    <span class="badge top">TOP</span>
    <img src="sth.jfif">
    <div class="card-content">
      <h3>Stranger Things</h3>
      <div class="info">
        <span>2016</span>
        <span>Sci-Fi</span>
      </div>
      <div class="rating">⭐ 8.7</div>
    </div>
    <div class="hover-overlay">
      <a href="#" class="details-btn">View Details</a>
    </div>
  </div>


  <div class="series-card">
    <span class="badge new">NEW</span>
    <img src="The Last of Us - 2023.jfif">
    <div class="card-content">
      <h3>The Last of Us</h3>
      <div class="info">
        <span>2023</span>
        <span>Drama</span>
      </div>
      <div class="rating">⭐ 8.8</div>
    </div>
    <div class="hover-overlay">
      <a href="#" class="details-btn">View Details</a>
    </div>
  </div>

</section>

</body>
</html>
